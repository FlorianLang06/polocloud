name: Beta Build

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'BETA'
        type: choice
        options:
          - ALPHA
          - BETA

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version from gradle.properties
        id: version
        run: |
          MAJOR=$(grep "cloud.version.major" gradle.properties | cut -d'=' -f2)
          MINOR=$(grep "cloud.version.minor" gradle.properties | cut -d'=' -f2)
          PATCH=$(grep "cloud.version.patch" gradle.properties | cut -d'=' -f2)
          CHANNEL=$(echo "${{ github.event.inputs.channel }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$MAJOR.$MINOR.$PATCH-$CHANNEL.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$PATCH-$CHANNEL.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build (${{ github.event.inputs.channel }})
        run: ./gradlew build
          -Pcloud.version.channel=${{ github.event.inputs.channel }}
          -Pcloud.version.build=${{ github.run_number }}

      - name: Publish to Maven Central
        env:
          ossrhUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ossrhPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signingKey: ${{ secrets.SIGNING_KEY }}
          signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        # TODO check if the right release gets published @HttpMarco
        run: ./gradlew :common:publish 
          -Pcloud.version.channel=${{ github.event.inputs.channel }}
          -Pcloud.version.build=${{ github.run_number }}

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PoloCloud ${{ steps.version.outputs.version }}
          draft: false
          prerelease: true
          files: runner/build/libs/*.jar