name: Dev Build

on:
  push:
    branches: [ pre-10 ]
  pull_request:
    branches: [ pre-10 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version from gradle.properties
        id: version
        run: |
          MAJOR=$(grep "cloud.version.major" gradle.properties | cut -d'=' -f2)
          MINOR=$(grep "cloud.version.minor" gradle.properties | cut -d'=' -f2)
          PATCH=$(grep "cloud.version.patch" gradle.properties | cut -d'=' -f2)
          echo "version=$MAJOR.$MINOR.$PATCH-dev.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build (DEV)
        run: ./gradlew build -x test
          -Pcloud.version.channel=DEV
          -Pcloud.version.build=${{ github.run_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polocloud-${{ steps.version.outputs.version }}
          path: runner/build/libs/*.jar
          retention-days: 7