syntax = "proto3";

package cli;

option java_package = "de.polocloud.proto";
option java_outer_classname = "CliRegistrationProto";
option java_multiple_files = true;

service CliRegistrationService {
  rpc RegisterCli(RegisterCliRequest) returns (RegisterCliResponse);
  rpc DisconnectCli(DisconnectRequest) returns (DisconnectResponse);
}

message RegisterCliRequest {
  string token = 1;
  string csr_pem = 2;
}

message RegisterCliResponse {
  bool accepted = 3;
  string message = 4;
  string certificate_pem = 5;
  string ca_certificate_pem = 6;
}

message DisconnectRequest {}
message DisconnectResponse {}