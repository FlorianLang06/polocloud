syntax = "proto3";

package cluster;

option java_package = "de.polocloud.proto";
option java_outer_classname = "GroupProto";
option java_multiple_files = true;

service GroupApiService {
  rpc FindGroups (GroupListRequest) returns (GroupListResponse);
  rpc CreateGroup (CreateGroupRequest) returns (GroupData);
  rpc UpdateGroup (UpdateGroupRequest) returns (GroupData);
  rpc DeleteGroup (DeleteGroupRequest) returns (DeleteGroupResponse);
}

message GroupListRequest {
  optional string name_filter = 2;
  optional string type_filter = 3;
}

message GroupListResponse {
  repeated GroupData groups = 1;
}

message CreateGroupRequest {
  GroupData group = 1;
}

message UpdateGroupRequest {
  GroupData group = 1;
}

message DeleteGroupRequest {
  string name = 1;
}

message DeleteGroupResponse {
  bool success = 1;
}

message GroupData {
  string name = 1;
  int32 memory = 2;
  double startThreshold = 3;
  int64 minOnline = 4;
  int64 maxOnline = 5;
  string platform = 6;
  string version = 7;
  // Free-form key/value properties (e.g. `fallback=true`).
  map<string, string> properties = 8;
  // Ordered names of the templates applied to a service of this group on start (e.g.
  // `GLOBAL`, `GLOBAL_SERVER`, the group's own name).
  repeated string templates = 9;
}