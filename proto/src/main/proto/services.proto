syntax = "proto3";

package service;

option java_package = "de.polocloud.proto";
option java_outer_classname = "ServicesProto";
option java_multiple_files = true;

import "common.proto";

service ServiceManager {
  rpc ListServices (ListServicesRequest) returns (ListServicesResponse);
}

message ListServicesRequest {
  // optional Filter
  string plan_name = 1;
  string node_id = 2;
  common.ServiceState state = 3;
}

message ListServicesResponse {
  repeated ProtoServiceProcessData service_process = 1;
}

message ProtoServiceProcessData {
  string uuid = 1;
  int32 index = 2;
  string plan = 3;
  string node_id = 4;
  int32 bound_port = 5;
  int32 pid = 6;
  common.ServiceState state = 7;
}

message ProtoServiceControlPlan {
  string name = 1;
  string version = 2;
  bool unique_use = 3;
  bool required_on_node = 4;
  int32 minimum = 5;
  int32 maximum = 6;
  string node_whitelist = 7;
}