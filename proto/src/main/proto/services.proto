syntax = "proto3";

option java_package = "de.polocloud.proto";
option java_outer_classname = "Services";
option java_multiple_files = true;

service ServiceManager {
  rpc ListServices (ListServicesRequest) returns (ListServicesResponse);
}

message ListServicesRequest {
  // optional Filter
  string plan_name = 1;
  string node_id = 2;
  ServiceState state = 3;
}

message ListServicesResponse {
  repeated ProtoServiceProcessData serviceProcess = 1;
}

message ProtoServiceProcessData {
  string uuid = 1;
  string plan = 2;
  string node_id = 3;
  int32 bound_port = 4;
  int32 pid = 5;
  ServiceState state = 6;
}

message ProtoServiceControlPlan {
  string name = 1;
  string version = 2;
  bool unique_use = 3;
  bool required_on_node = 4;
  int32 minimum = 5;
  int32 maximum = 6;
  string node_whitelist = 7;
}


enum ServiceState {
  LOADING = 0;
  BOOTING = 1;
  RUNNING = 2;
  UNCONTROLLED = 3;
  FAILED = 4;
}