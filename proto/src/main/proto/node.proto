syntax = "proto3";

option java_package = "de.polocloud.proto";
option java_outer_classname = "NodeProto";
option java_multiple_files = true;

package node;

service NodeRegistrationService {
  // First contact with cluster
  rpc RegisterNode (RegisterNodeRequest) returns (RegisterNodeResponse);
}

message RegisterNodeRequest {
  string localId = 1;
  string group = 2;
  string hostname = 3;
  int32 port = 4;
  string token = 5;
  string publicKey = 6;
  NodeVersion details = 7;
}

message RegisterNodeResponse {
  bool accepted = 1;
  string message = 2;
  optional string certificate = 4;       // Node-Zertifikat (PEM)
  optional string ca_certificate = 5;    // CA-Zertifikat (PEM)
}

message NodeVersion {
  string version = 1;
  string gitHash = 2;
}