syntax = "proto3";

package node;

option java_package = "de.polocloud.proto";
option java_outer_classname = "NodeProto";
option java_multiple_files = true;

import "common.proto";

service NodeRegistrationService {
  rpc RegisterNode (RegisterNodeRequest) returns (RegisterNodeResponse);
}

message RegisterNodeRequest {
  string local_id = 1;
  string group = 2;
  string hostname = 3;
  int32 port = 4;
  string token = 5;
  string csr_pem = 6;
  NodeVersion details = 7;
  // Total system memory (MB) of the joining node, so the cluster can enforce a
  // per-node capacity cap during service placement (see ServiceQueue).
  int32 max_memory = 8;
}

message RegisterNodeResponse {
  bool accepted = 1;
  string message = 2;
  optional string certificate = 4;
  optional string ca_certificate = 5;
}

message NodeVersion {
  string version = 1;
  string gitHash = 2;
}

service NodeService {
  rpc GetNodeInformation (NodeInformationRequest) returns (NodeInformationResponse);
  rpc ListenForEvents (NodeEventRequest) returns (stream NodeEvent);
  // Node-to-node relay of a cluster event: the origin node pushes each locally-fired
  // event to its peers, which re-broadcast it to their own local subscribers only
  // (no re-relay), giving the cluster a single live event view without loops.
  rpc RelayEvent (RelayEventRequest) returns (RelayEventResponse);
  // Lets a newly-joined node adopt the real cluster CA key pair from a peer that
  // already holds it, instead of only ever keeping the throwaway one it self-signed
  // during its own bootstrap. Required so that a node promoted to head by
  // leader election (see NodeElectionService) is actually able to sign certificates
  // the rest of the cluster trusts. Only served to callers whose peer certificate CN
  // resolves to a known node id — see NodeServiceImpl.fetchClusterCa.
  rpc FetchClusterCa (FetchClusterCaRequest) returns (FetchClusterCaResponse);
}

message FetchClusterCaRequest {}

message FetchClusterCaResponse {
  bool available = 1;
  string message = 2;
  string ca_private_key = 3;
  string ca_public_key = 4;
}

message RelayEventRequest {
  string event_name = 1;
  string event_data = 2;
}

message RelayEventResponse {
  bool success = 1;
}

message NodeInformationRequest {}

message NodeInformationResponse {
  string node_name = 1;
}

message NodeEventRequest {}

message NodeEvent {
  enum Type {
    UNKNOWN = 0;
    NODE_SHUTDOWN = 1;
  }

  Type type = 1;
}