syntax = "proto3";

package cluster;

option java_package = "de.polocloud.proto";
option java_outer_classname = "ClusterProto";
option java_multiple_files = true;

import "common.proto";
import "proto_registration_token.proto";

service ClusterService {
  rpc CreateToken (CreateTokenRequest) returns (CreateTokenResponse);
  rpc ListNodes (ListNodesRequest) returns (ListNodesResponse);
}

message CreateTokenRequest {
  int64 ttlMs = 1;
}

message CreateTokenResponse {
  token.ProtoRegistrationToken token = 1;
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated ProtoNodeData nodes = 1;
}

message ProtoNodeData {
  string id = 1;
  int32 index = 2;
  string group_name = 3;

  string hostname = 4;
  int32 port = 5;

  common.NodeState state = 6;

  bool head = 7;

  string version = 8;
  string git_commit_hash = 9;

  int64 first_connection = 10;
  int64 last_connection = 11;
}