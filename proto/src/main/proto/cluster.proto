syntax = "proto3";

option java_package = "de.polocloud.proto";
option java_outer_classname = "Cluster";
option java_multiple_files = true;

service ClusterService {
  rpc ListNodes (ListNodesRequest) returns (ListNodesResponse);
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated ProtoNodeData nodes = 1;
}

message ProtoNodeData {
  string id = 1;
  int32 index = 2;
  string group_name = 3;

  string hostname = 4;
  int32 port = 5;

  NodeState state = 6;

  bool head = 7;

  string version = 8;
  string git_commit_hash = 9;

  int64 first_connection = 10;
  int64 last_connection = 11;
}

enum NodeState {
  OFFLINE = 0;
  STARTING = 1;
  SYNCING = 2;
  ONLINE = 3;
  STOPPING = 4;
  STOPPED = 5;
  CRASHED = 6;
}